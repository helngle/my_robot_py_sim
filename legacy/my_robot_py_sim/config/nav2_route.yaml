route_server:
  ros__parameters:
    use_sim_time: true
    graph_filepath: route_graph.geojson
    graph_file_loader: GeoJsonGraphFileLoader
    graph_file_saver: GeoJsonGraphFileSaver
    route_frame: map
    base_frame: base_footprint
    path_density: 0.05
    max_planning_time: 2.0
    edge_cost_functions: ["DistanceScorer"]
    DistanceScorer:
      plugin: nav2_route::DistanceScorer
