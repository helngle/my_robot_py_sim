table_viewpoint_planner:
  ros__parameters:
    map_frame: map
    base_frame: base_footprint
    camera_info_topic: /camera/color/camera_info
    # topic (default): consume vision_msgs/Detection3D from bbox_topic.
    # yaml: load a named box from tables.yaml.
    input_mode: topic
    bbox_topic: /target_bbox_3d
    global_costmap_topic: /global_costmap/costmap
    local_costmap_topic: /local_costmap/costmap

    table_name: office_desk_1
    observe_tabletop_only: true
    tabletop_thickness_m: 0.05

    robot_length_m: 0.80
    robot_width_m: 0.70
    footprint_margin_m: 0.05
    occupied_cost_threshold: 50
    reject_unknown_cost: true

    min_standoff_m: 0.60
    max_standoff_m: 3.00
    standoff_step_m: 0.10
    image_margin_ratio: 0.05

    # Candidate score = weighted sum of five normalized terms.
    area_weight: 0.70
    horizontal_center_weight: 0.10
    vertical_center_weight: 0.08
    clearance_weight: 0.10
    travel_weight: 0.02
    # Area normalization ceiling. If all valid candidates are below this,
    # the largest candidate in the current batch receives area_score=1.0.
    target_area_ratio: 0.60
    horizontal_error_scale: 0.10
    vertical_error_scale: 0.20
    travel_distance_scale_m: 8.0

    max_bbox_tilt_deg: 10.0
    bbox_position_tolerance_m: 0.03
    bbox_size_tolerance_m: 0.03
    bbox_yaw_tolerance_rad: 0.03
    repeat_bbox_retriggers_goal: true
    repeat_bbox_retrigger_distance_m: 0.35

    # Keep normal navigation fast, then cap the table approach speed close to
    # the selected viewpoint so the physical base has room to stop precisely.
    approach_slowdown_distance_m: 1.50
    approach_speed_limit_mps: 0.15
    speed_limit_topic: /speed_limit

    auto_send_goal: true
    publish_table_marker: true
    publish_goal_marker: true
    publish_candidate_markers: false

sam3_table_bbox_node:
  ros__parameters:
    color_topic: /camera/color/image_raw
    depth_topic: /camera/depth/image_raw
    camera_info_topic: /camera/color/camera_info
    bbox_topic: /target_bbox_3d
    debug_image_topic: /sam3_table_mask/debug
    marker_topic: /sam3_table_bbox_marker
    target_frame: map

    # Experimental open-vocabulary table detector. It runs only when
    # /detect_sam3_table is called, then publishes one Detection3D.
    sam3_model: ''
    sam3_prompt: office desk
    sam3_device: cuda
    sam3_confidence: 0.25
    sam3_imgsz: 1024

    min_depth_m: 0.25
    max_depth_m: 6.0
    min_mask_area_px: 500
    max_points_for_fit: 3000
    depth_percentile_low: 5.0
    depth_percentile_high: 95.0
    xy_percentile_low: 2.0
    xy_percentile_high: 98.0
    min_box_length_m: 0.20
    min_box_width_m: 0.20
    min_box_height_m: 0.05
    bbox_id: sam3_table
    publish_debug_image: true
    debug_republish_rate_hz: 2.0
